name: Deploy Docs (Fumadocs)

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "docs~/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs~/package-lock.json

      - name: Install dependencies
        working-directory: docs~
        run: npm ci

      - name: Build static site
        working-directory: docs~
        run: npm run build

      - name: Disable Jekyll
        run: touch docs~/out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs~/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 문서가 빌드되면 cording-library(docs.somiri.dev) 통합 빌드를 자동 트리거한다.
  # DOCS_TOKEN(전용 PAT) 시크릿이 등록돼 있을 때만 동작하고, 없으면 조용히 건너뛴다.
  notify-hub:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs hub rebuild
        env:
          DOCS_TOKEN: ${{ secrets.DOCS_TOKEN }}
        run: |
          if [ -z "$DOCS_TOKEN" ]; then
            echo "DOCS_TOKEN secret not set — skipping hub notify"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: token $DOCS_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/achieveonepark/cording-library/dispatches \
            -d '{"event_type":"docs-updated"}'
          echo "Notified docs hub (cording-library)"
